<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="bugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F22076" />
      <stop offset="100%" stop-color="#FF5E62" />
    </linearGradient>
  </defs>
  <!-- Outer circle / Lens border -->
  <circle cx="45" cy="45" r="35" fill="none" stroke="url(#lensGrad)" stroke-width="8" />
  <!-- Glass reflection -->
  <circle cx="45" cy="45" r="31" fill="#00F2FE" fill-opacity="0.1" />
  <!-- Magnifying Glass Handle -->
  <line x1="70" y1="70" x2="90" y2="90" stroke="url(#lensGrad)" stroke-width="10" stroke-linecap="round" />
  <!-- Subtle inner lens reflection arc -->
  <path d="M22,30 A 25 25 0 0 1 60,18" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  
  <!-- Bug Icon in the center -->
  <g transform="translate(30, 30) scale(0.6)">
    <!-- Bug Body -->
    <rect x="20" y="15" width="20" height="30" rx="10" fill="url(#bugGrad)" />
    <!-- Bug Head -->
    <circle cx="30" cy="10" r="8" fill="url(#bugGrad)" />
    <!-- Antennas -->
    <path d="M25,5 Q 20,-5 12,-2" fill="none" stroke="url(#bugGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M35,5 Q 40,-5 48,-2" fill="none" stroke="url(#bugGrad)" stroke-width="3" stroke-linecap="round" />
    <!-- Legs -->
    <!-- Left legs -->
    <path d="M15,22 L 5,20" stroke="url(#bugGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M15,30 L 3,30" stroke="url(#bugGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M15,38 L 5,42" stroke="url(#bugGrad)" stroke-width="3" stroke-linecap="round" />
    <!-- Right legs -->
    <path d="M45,22 L 55,20" stroke="url(#bugGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M45,30 L 57,30" stroke="url(#bugGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M45,38 L 55,42" stroke="url(#bugGrad)" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>